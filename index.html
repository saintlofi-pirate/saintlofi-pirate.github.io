<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f2a22">
  <meta name="description" content="Saint Lofi builds calm, useful software for WordPress, creators, and small teams.">
  <title>Saint Lofi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;750&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene" aria-label="Saint Lofi portfolio">
    <div class="sky" aria-hidden="true">
      <span class="moon"></span>
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="mist mist-a"></span>
      <span class="mist mist-b"></span>
      <span class="firefly f1"></span>
      <span class="firefly f2"></span>
      <span class="firefly f3"></span>
      <span class="firefly f4"></span>
    </div>

    <section class="portfolio" aria-labelledby="portfolio-title">
      <p class="eyebrow">quiet software studio</p>
      <h1 id="portfolio-title">Saint Lofi</h1>
      <p class="intro">
        Calm, useful products for people who make things on the web. I build WordPress tools,
        focused interfaces, and tiny systems that feel good to return to.
      </p>

      <div class="actions" aria-label="Portfolio links">
        <a class="button primary" href="https://github.com/saintlofi-pirate">GitHub</a>
        <a class="button" href="https://github.com/saintlofi-pirate/pulse-press">PulsePress</a>
      </div>

      <ul class="signals" aria-label="Focus areas">
        <li><span>01</span> WordPress products</li>
        <li><span>02</span> Gentle growth tools</li>
        <li><span>03</span> Fast static experiences</li>
      </ul>
    </section>

    <div class="forest" aria-hidden="true">
      <div class="tree-line far">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="tree-line mid">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="tree-line near">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="hammock-scene">
        <span class="hammock-tree left"></span>
        <span class="hammock-tree right"></span>
        <span class="hammock-rope"></span>
        <span class="hammock-fabric"></span>
        <span class="chill-dev">
          <span class="head"></span>
          <span class="hair"></span>
          <span class="body"></span>
          <span class="laptop"></span>
          <span class="leg"></span>
        </span>
      </div>
      <div class="campfire">
        <span class="log log-a"></span>
        <span class="log log-b"></span>
        <span class="ember"></span>
        <span class="flame flame-a"></span>
        <span class="flame flame-b"></span>
        <span class="flame flame-c"></span>
        <span class="smoke smoke-a"></span>
        <span class="smoke smoke-b"></span>
      </div>
      <div class="horse">
        <span class="horse-body"></span>
        <span class="horse-neck"></span>
        <span class="horse-head"></span>
        <span class="horse-ear"></span>
        <span class="horse-tail"></span>
        <span class="horse-leg leg-a"></span>
        <span class="horse-leg leg-b"></span>
        <span class="horse-leg leg-c"></span>
        <span class="horse-leg leg-d"></span>
      </div>
    </div>

    <div class="cursor-orb" aria-hidden="true"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
