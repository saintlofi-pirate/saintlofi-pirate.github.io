<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111722">
  <meta name="description" content="Saint Lofi is a quiet digital studio for WordPress products, creator tools, and calm web experiences.">
  <title>Saint Lofi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;750&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="cosmos" aria-label="Saint Lofi portfolio">
    <div class="stars" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <section class="hero" aria-labelledby="hero-title">
      <div class="orbit-mark" aria-hidden="true">
        <span class="crest-orbit"></span>
        <span class="crest-moon"></span>
        <span class="crest-ridge"></span>
        <span class="crest-star"></span>
      </div>

      <p class="eyebrow">quiet digital studio</p>
      <h1 id="hero-title">Saint Lofi</h1>
      <p class="intro">Handmade WordPress products, creator tools, and calm interfaces for people building on the web.</p>

      <nav class="links" aria-label="Portfolio links">
        <a href="https://github.com/saintlofi-pirate">GitHub</a>
        <a href="https://github.com/saintlofi-pirate/pulse-press">PulsePress</a>
        <a href="https://saintlofi-pirate.github.io/pulse-press/">Project page</a>
      </nav>
    </section>

    <div class="planet" aria-hidden="true">
      <span class="planet-ring ring-one"></span>
      <span class="planet-ring ring-two"></span>
      <div class="soil"></div>
      <div class="moon-dev">
        <span class="helmet"></span>
        <span class="visor"></span>
        <span class="body"></span>
        <span class="arm"></span>
        <span class="tool"></span>
        <span class="shadow"></span>
      </div>
      <span class="plant plant-a"></span>
      <span class="plant plant-b"></span>
      <span class="plant plant-c"></span>
      <span class="plant plant-d"></span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
