<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111722">
  <meta name="description" content="Saint Lofi is a quiet digital studio for WordPress products, creator tools, and calm web experiences.">
  <title>Saint Lofi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;750&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="cosmos" aria-label="Saint Lofi portfolio">
    <div class="atmosphere" aria-hidden="true"></div>
    <div class="stars" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <section class="hero" aria-labelledby="hero-title">
      <div class="signal-mark" aria-hidden="true">
        <span class="signal-line"></span>
        <span class="signal-star"></span>
      </div>

      <p class="eyebrow">quiet digital studio</p>
      <h1 id="hero-title">Saint Lofi</h1>
      <p class="intro">Handmade WordPress products, creator tools, and calm interfaces for people building on the web.</p>

      <nav class="links" aria-label="Portfolio links">
        <a href="https://github.com/saintlofi-pirate">GitHub</a>
        <a href="https://github.com/saintlofi-pirate/pulse-press">PulsePress</a>
        <a href="https://saintlofi-pirate.github.io/pulse-press/">Project page</a>
      </nav>
    </section>

    <div class="moon-surface" aria-hidden="true">
      <span class="planet-ring ring-one"></span>
      <span class="planet-ring ring-two"></span>
      <span class="crater crater-a"></span>
      <span class="crater crater-b"></span>
      <span class="crater crater-c"></span>
      <span class="ridge ridge-a"></span>
      <span class="ridge ridge-b"></span>
      <div class="lighthouse">
        <span class="beam"></span>
        <span class="lantern-glow"></span>
        <span class="lantern-room"></span>
        <span class="cap"></span>
        <span class="tower"></span>
        <span class="door"></span>
        <span class="window window-a"></span>
        <span class="window window-b"></span>
        <span class="base"></span>
        <span class="weather-line line-a"></span>
        <span class="weather-line line-b"></span>
        <span class="weather-line line-c"></span>
      </div>
      <span class="rock rock-a"></span>
      <span class="rock rock-b"></span>
      <span class="rock rock-c"></span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
